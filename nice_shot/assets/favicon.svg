<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131e36"/>
      <stop offset="100%" stop-color="#080e1a"/>
    </linearGradient>
    <!-- Back arc: darker, receding -->
    <linearGradient id="back" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4ab0"/>
      <stop offset="100%" stop-color="#0d1e6b"/>
    </linearGradient>
    <!-- Front arc: brighter, coming forward -->
    <linearGradient id="front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7aaaff"/>
      <stop offset="100%" stop-color="#3a6eee"/>
    </linearGradient>
    <!-- Clip to bottom half for front arc -->
    <clipPath id="lower">
      <rect x="0" y="50" width="100" height="50"/>
    </clipPath>
    <!-- Clip to top half for specular highlight -->
    <clipPath id="upper">
      <rect x="0" y="0" width="100" height="50"/>
    </clipPath>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect width="100" height="100" fill="url(#bg)" rx="18"/>

  <!-- Back half of torus ring (dimmer, receding) -->
  <ellipse cx="50" cy="50" rx="29" ry="16"
           fill="none" stroke="url(#back)" stroke-width="17"
           stroke-opacity="0.9"/>

  <!-- Hole: punch out the centre with the background colour -->
  <ellipse cx="50" cy="50" rx="13" ry="6" fill="url(#bg)"/>

  <!-- Front arc (bottom half — comes in front of the hole) -->
  <ellipse cx="50" cy="50" rx="29" ry="16"
           fill="none" stroke="url(#front)" stroke-width="17"
           clip-path="url(#lower)"
           filter="url(#glow)"/>

  <!-- Specular highlight — small bright streak top-left of the ring -->
  <ellipse cx="50" cy="50" rx="29" ry="16"
           fill="none" stroke="white" stroke-width="5"
           stroke-opacity="0.18" stroke-dasharray="18 200"
           stroke-dashoffset="-52"
           clip-path="url(#upper)"/>
</svg>
